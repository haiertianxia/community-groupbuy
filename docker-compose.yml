version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///app/community_groupbuy.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=false
      - COMMISSION_RATE=5.0
    volumes:
      - groupbuy_data:/app

volumes:
  groupbuy_data:
